<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Private Meeting</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #121212; font-family: sans-serif; }
        #meet { height: 100%; width: 100%; }
        .gate-screen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; text-align: center; background: #1e1e1e; padding: 40px; border-radius: 15px; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="meet">
        <div class="gate-screen" id="gate">
            <h2>🔒 Secure Access</h2>
            <p>Enter password to start meeting</p>
            <input type="password" id="passInput" style="padding: 10px;" placeholder="Password">
            <button onclick="checkAccess()" style="padding: 10px; background: #27ae60; color: white; border: none; cursor: pointer;">Join Now</button>
        </div>
    </div>

    <script src="https://meet.jit.si/external_api.js"></script>
    
    <script>
        // 1. CHOOSE A VERY UNIQUE BASE NAME
        // Change "CompanyX" to your company name
        const BASE_ROOM = "CompanyX_Private_Room_2026_"; 
        const SECRET_PASSWORD = "MyTeam123"; 

        function checkAccess() {
            if (document.getElementById('passInput').value === SECRET_PASSWORD) {
                document.getElementById('gate').style.display = "none";
                startMeeting();
            } else { alert("Wrong Password"); }
        }

        function startMeeting() {
            const domain = "meet.jit.si";
            
            // This ensures the room is unique so no moderator is needed
            // NOTE: For a group call, everyone must use the SAME name.
            // If you want to meet with others, everyone should use the same BASE_ROOM.
            const finalRoomName = BASE_ROOM + "Alpha99"; 

            const options = {
                roomName: finalRoomName,
                width: "100%",
                height: "100%",
                parentNode: document.querySelector('#meet'),
                configOverwrite: {
                    prejoinPageEnabled: false,
                    disableInviteFunctions: true,
                    // These settings help bypass office firewalls
                    iceTransportPolicy: 'relay',
                    enableP2P: false 
                },
                interfaceConfigOverwrite: {
                    TOOLBAR_BUTTONS: ['microphone', 'camera', 'desktop', 'hangup', 'tileview']
                }
            };
            const api = new JitsiMeetExternalAPI(domain, options);
        }
    </script>
</body>
</html>
