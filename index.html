<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Private Meeting</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #121212; font-family: sans-serif; }
        #meet { height: 100%; width: 100%; }
        .gate-screen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; text-align: center; background: #1e1e1e; padding: 40px; border-radius: 15px; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="meet">
        <div class="gate-screen" id="gate">
            <h2>🔒 Secure Access</h2>
            <input type="password" id="passInput" style="padding: 10px;" placeholder="Password">
            <button onclick="checkAccess()" style="padding: 10px; background: #27ae60; color: white;">Join</button>
        </div>
    </div>

    <script src="https://meet.jit.si/external_api.js"></script>
    
    <script>
        const SECRET_PASSWORD = "MyTeam123"; 
        const MY_ROOM_NAME = "Private_Alpha_Meeting_2026"; // Change this to something very unique

        function checkAccess() {
            if (document.getElementById('passInput').value === SECRET_PASSWORD) {
                document.getElementById('gate').style.display = "none";
                startMeeting();
            } else { alert("Wrong Password"); }
        }

        function startMeeting() {
            const domain = "meet.jit.si";
            const options = {
                roomName: MY_ROOM_NAME,
                width: "100%",
                height: "100%",
                parentNode: document.querySelector('#meet'),
                configOverwrite: {
                    prejoinPageEnabled: false,
                    // FORCE VIDEO THROUGH FIREWALL
                    iceTransportPolicy: 'relay', 
                    preferH264: true,
                    disableP2P: true 
                },
                interfaceConfigOverwrite: {
                    TOOLBAR_BUTTONS: ['microphone', 'camera', 'desktop', 'hangup', 'tileview']
                }
            };
            new JitsiMeetExternalAPI(domain, options);
        }
    </script>
</body>
</html>
